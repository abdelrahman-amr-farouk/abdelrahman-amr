<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>course organizer</title>
    </head>
    <body>
        <header>
            <h1>courses organizer</h1>
            <nav>
                <a href="index.html" title="home page">Home</a>
                <a href="courses.html"title="saved courses">Courses</a>
                <a href="add-course.html"title="add a new course">Add Course</a>
                <a href="contact.html"title=" for help">Contact Us</a>
            </nav>
        </header>

        <main>
            <section>
                <h2>Add a New Course</h2>
                <form method="post">
                    <div>
                        <label for="course-name">Course Name:</label>
                        <input type="text" id="coursename" name="coursename" autofocus required placeholder="e.x.,Data Structure">
                    </div>
                    <div>
                        <label for="doctor-name">Doctor Name:</label>
                        <input type="text" id="doctorname" name="doctorname" required placeholder="e.x.,Bishoy">
                    </div>
                    <div>
                        <label for="credit-hours">Credit Hours:</label>
                        <input type="number" id="credithours" name="credithours" min="0" max="5" required placeholder="e.x.,3">
                    </div>
                    <div>
                        <label for="notes">Notes:</label>
                        <textarea id="notes" name="notes" rows="4" placeholder="Add any relevant schedule notes or reminders here..."></textarea>
                    </div>
                    <button type="submit">Save Course</button>
                </form>
            </section>
        </main>

        <footer>
            <p>2026 My First web site (personal course organizer)</p>
        </footer>
    </body>    
</html>
