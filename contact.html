<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>course organizer</title>
    </head>
    <body>
        <header>
            <h1>courses organizer</h1>
            <nav>
                <a href="index.html" title="home page">Home</a>
                <a href="courses.html"title="saved courses">Courses</a>
                <a href="add-course.html"title="add a new course">Add Course</a>
                <a href="contact.html"title=" for help">Contact Us</a>
            </nav>
        </header>
        
        <main>
        <section>
            <h2>Contact Administration</h2>
            <p>If you are experiencing scheduling conflicts have general inquiries, please reach out to us below.</p>
            <br>
            <form method="POST">
                <div>
                    <label for="studentName">Full Name:</label>
                    <input type="text" id="studentName" name="studentName" required>
                </div>
                
                <div>
                    <label for="studentId">Student ID:</label>
                    <input type="text" id="studentId" name="studentId" required>
                </div>

                <div>
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>2026 My First web site (personal course organizer)</p>
    </footer>
</body>
</html>
